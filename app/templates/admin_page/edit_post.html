<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post - Garland Shop</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'admin_dashboard' %}" class="logo">Admin Dashboard</a>
            <ul class="nav-links">
                <li><a href="{% url 'admin_dashboard' %}">Dashboard</a></li>
                <li><a href="{% url 'user_posts' %}">View Website</a></li>
                <li><a href="{% url 'logout' %}">Logout</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="main-content">
            <h1>Edit Post</h1>
            {% if error_message %}
            <div class="error-message">
                {{ error_message }}
            </div>
            {% endif %}
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-group">
                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title" value="{{ post.title }}" required>
                </div>
                <div class="form-group">
                    <label for="description">Description:</label>
                    <textarea id="description" name="description" rows="5" required>{{ post.description }}</textarea>
                </div>
                <div class="form-group">
                    <label for="category">Category:</label>
                    <select id="category" name="category" required>
                        <option value="garland" {% if post.category == 'garland' %}selected{% endif %}>Garland for Marriage</option>
                        <option value="marriage" {% if post.category == 'marriage' %}selected{% endif %}>Decoration for Marriage</option>
                        <option value="gods" {% if post.category == 'gods' %}selected{% endif %}>Gods Decoration</option>
                        <option value="gods_decoration" {% if post.category == 'gods_decoration' %}selected{% endif %}>Gods Garland</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="price">Price (₹):</label>
                    <input type="number" id="price" name="price" step="0.01" min="0" value="{{ post.price }}" placeholder="Enter price" required>
                    <small>Enter the price in rupees</small>
                </div>
                <div class="form-group">
                    <label for="image">Image:</label>
                    {% if post.image %}
                    <div class="current-image">
                        <p><strong>Current image:</strong></p>
                        <img src="{{ post.image.url }}" alt="{{ post.title }}" style="max-width: 300px; border-radius: 8px; margin: 10px 0;">
                    </div>
                    {% endif %}
                    <input type="file" id="image" name="image" accept="image/*">
                    <small>Leave empty to keep current image</small>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update Post</button>
                    <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
