{% extends 'base.html' %}
{% load static %}

{% block title %}Login - BBJM Garland{% endblock %}

{% block content %}
<section class="section-padding" style="min-height: 80vh; display: flex; align-items: center; background: url('{% static 'css/assets/hero_bg.png' %}') center center/cover;">
    <div class="container" style="display: flex; justify-content: center;">
        <div class="card" style="max-width: 450px; width: 100%; padding: 3rem; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <h2 class="section-title">Welcome Back</h2>
                <p>Sign in to your BBJM account</p>
            </div>
            
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Username</label>
                    <input type="text" name="username" required 
                           style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: var(--radius-sm);">
                </div>
                <div style="margin-bottom: 2rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
                    <input type="password" name="password" required 
                           style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: var(--radius-sm);">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem;">Sign In</button>
                
                <p style="text-align: center; font-size: 0.9rem;">
                    Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary); font-weight: 600;">Create one</a>
                </p>
            </form>
        </div>
    </div>
</section>
{% endblock %}
