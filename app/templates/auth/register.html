<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Garland Shop</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="login-container">
        <h1>Create your account</h1>

        {% if error_message %}
        <div class="error-message">
            {{ error_message }}
        </div>
        {% endif %}

        <form method="post" autocomplete="off">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Username<span style="color:#dc3545;">*</span></label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>

            <div class="form-group">
                <label for="email">Email (optional)</label>
                <input type="email" id="email" name="email" placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password<span style="color:#dc3545;">*</span></label>
                <input type="password" id="password" name="password" placeholder="Enter a password" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password<span style="color:#dc3545;">*</span></label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Create account</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <a href="{% url 'login' %}" style="color: #667eea; text-decoration: none;">Already have an account? Login →</a>
        </div>
    </div>
</body>
</html>
